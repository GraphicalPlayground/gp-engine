name: Bug report
description: Report a bug in the Graphical Playground (GP) engine

body:
  - type: markdown
    attributes:
      value: |
        Follow the guidelines below. They help contributors reproduce and fix issues faster.
        - Write a descriptive title above.
        - One issue per bug. Found several? Open a separate issue for each.
        - Search [open](https://github.com/GraphicalPlayground/gp-engine/issues) and [closed](https://github.com/GraphicalPlayground/gp-engine/issues?q=is%3Aissue+is%3Aclosed) issues first. If nothing matches, open a new one.
        - Check whether the bug reproduces on the latest `main` — it may already be fixed.
        - On a custom build, verify the bug also occurs on an official release without local modifications or third-party modules.

  - type: textarea
    attributes:
      label: Tested versions
      description: |
        Knowing when a bug was introduced matters. List the GP engine version and commit hash where it occurs (`git rev-parse --short HEAD`). If you can, test the previous release tag too and note whether the bug is there — that narrows down regressions quickly.
      placeholder: |
        - Reproducible in: v0.3.0 [a1b2c3d], main @ 2026-02-20 [e4f5g6h]
        - Not reproducible in: v0.2.1 [x9y8z7w]
    validations:
      required: true

  - type: input
    attributes:
      label: System information
      description: |
        - OS name and version (e.g. Windows 11, Ubuntu 24.04, macOS 15.0).
        - CPU model and architecture (x86_64 or ARM64).
        - GPU model, driver version, and the active RHI backend (Vulkan, DX12, Metal).
        - Compiler and version used for the build (e.g. Clang 18, GCC 14, MSVC 19.40).
        - CMake build type (Debug, Release, RelWithDebInfo).
        - **Bug reports missing required system information may be closed at the maintainers' discretion.**
      placeholder: "Ubuntu 24.04 - GP v0.3.0 [a1b2c3d] - Vulkan - NVIDIA RTX 4080 (driver 565.77) - AMD Ryzen 9 7950X (x86_64) - Clang 18 - RelWithDebInfo"
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Affected module(s)
      description: Which GP engine module(s) does this bug affect? Select all that apply.
      multiple: true
      options:
        - Core
        - HAL
        - Platform
        - RHI
        - Renderer
        - Shaders
        - Editor
        - Build / CMake
        - Unknown / Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Issue description
      description: |
        Describe the bug clearly. What behaviour did you observe, and what did you expect instead?
        - Include relevant log output, assertion failures, or crash stack traces as text (not screenshots).
        - Format code and logs with triple-backtick blocks (` ``` `).
        - If the bug is visual or rendering-related, attach a screenshot or recording alongside the text description.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: |
        List the exact steps or a self-contained C++ snippet that reliably triggers the bug. Without a reproduction, the issue is very hard to investigate.
      placeholder: |
        1. Configure with `cmake -B Build -DCMAKE_BUILD_TYPE=Debug`
        2. Build target `GPRuntimeCore`
        3. Run `./Binaries/Bin/GPRuntimeCoreTests "[MyFeature]"`
        4. Observe assertion failure in `TMyClass::DoThing()`
    validations:
      required: true

  - type: textarea
    attributes:
      label: Minimal reproduction case (MRC)
      description: |
        - The smallest C++ code or test case that triggers the bug, ideally as a self-contained Catch2 test.
        - For build-system issues, include the relevant `CMakeLists.txt` fragment and CMake output.
        - If no isolated reproduction is possible, name the existing test or executable that triggers it and write "N/A" here.
    validations:
      required: true
