name: 'Setup Graphical Playground Dependencies'
description: 'Caches CMake FetchContent dependencies and installs heavy system SDKs.'

inputs:
  os:
    description: 'The runner OS (e.g., ubuntu-latest, windows-latest)'
    required: true
  build-dir:
    description: 'The CMake build directory'
    required: false
    default: 'build'

runs:
  using: "composite"
  steps:
    - name: Install Linux Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        # Includes Clang, Ninja, Vulkan headers, and all SDL3 system requirements.
        # (Removed git/cmake/build-essential as they are pre-installed on GitHub runners)
        sudo apt-get install -y clang llvm ninja-build pkg-config \
          libasound2-dev libpulse-dev libaudio-dev libjack-dev libsndio-dev \
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
          libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev \
          libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
          libdbus-1-dev libibus-1.0-dev libudev-dev libwayland-dev libvulkan-dev

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      shell: bash
      run: |
        # Apple Clang, Metal, and OpenGL are pre-installed via Xcode CLI tools.
        # We just need to install Ninja.
        brew install ninja

    - name: Install Windows Dependencies
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # Windows SDK (D3D11/D3D12) is pre-installed on GitHub runners.
        # We need LLVM/Clang and Ninja.
        choco install llvm ninja -y

    - name: Enforce Clang for CMake
      shell: bash
      run: |
        # Exporting CC and CXX environment variables tells CMake to use Clang 
        # instead of defaulting to GCC (Linux) or MSVC (Windows).
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV
