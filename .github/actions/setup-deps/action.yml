name: 'Setup Graphical Playground Dependencies'
description: 'Caches CMake FetchContent dependencies and installs heavy system SDKs.'

inputs:
  os:
    description: 'The runner OS (e.g., ubuntu-latest, windows-latest)'
    required: true
  build-dir:
    description: 'The CMake build directory'
    required: false
    default: 'build'

runs:
  using: "composite"
  steps:
    # Cache FetchContent dependencies to speed up subsequent builds
    - name: Cache FetchContent Dependencies
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/${{ inputs.build-dir }}/_deps
        key: ${{ inputs.os }}-cmake-deps-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
        restore-keys: |
          ${{ inputs.os }}-cmake-deps-

    # Install heavy system SDKs (e.g., Vulkan SDK) that are not easily cached
    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2.1
      with:
        vulkan-query-version: '1.4.341.0'
        vulkan-components: Vulkan-Headers, Vulkan-Loader, Glslang, SPIRV-Cross, SPIRV-Tools, SPIRV-Reflect, SPIRV-Headers
        vulkan-use-cache: true

    # TODO: Add steps to install other heavy dependencies like DirectX SDK, OpenGL libraries, SDL3, etc.
